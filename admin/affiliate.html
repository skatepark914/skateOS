<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team rider · skateOS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛹%3C/text%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#fdf4ff 0%,#fff 50%,#fef3c7 100%);min-height:100vh;color:#1f2937;padding:0;}
  .container{max-width:680px;margin:0 auto;padding:30px 20px;}
  .biz-header{text-align:center;font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:#6b7280;margin-bottom:24px;}
  .card{background:#fff;border-radius:18px;padding:32px 28px;box-shadow:0 4px 20px rgba(0,0,0,.04);border:1px solid #f3f4f6;}
  .photo{width:120px;height:120px;border-radius:50%;background:#f3e8ff center/cover no-repeat;border:4px solid #a78bfa;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:3rem;color:#7c3aed;font-weight:800;}
  .name{font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:4px;}
  .role{text-align:center;color:#7c3aed;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px;}
  .code-box{background:linear-gradient(135deg,#fdf4ff,#fef3c7);border:2px dashed #a78bfa;border-radius:12px;padding:18px;text-align:center;margin-bottom:18px;}
  .code-box .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#7c3aed;margin-bottom:6px;font-weight:700;}
  .code-box .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:1.8rem;font-weight:800;color:#581c87;letter-spacing:.05em;}
  .code-box .copy{margin-top:10px;background:#7c3aed;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9rem;}
  .code-box .copy:active{transform:scale(.98);}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .stat{background:#f9fafb;border-radius:10px;padding:14px;text-align:center;}
  .stat .n{font-size:1.6rem;font-weight:800;color:#7c3aed;}
  .stat .l{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;font-weight:700;margin-top:2px;}
  .bio{font-size:.95rem;line-height:1.5;color:#374151;background:#f9fafb;padding:14px 16px;border-radius:10px;margin-bottom:14px;font-style:italic;}
  .socials{display:flex;justify-content:center;gap:14px;font-size:1.4rem;margin-bottom:18px;}
  .socials a{color:#6b7280;text-decoration:none;}
  .socials a:hover{color:#7c3aed;}
  .cta{display:block;text-align:center;background:#e11d48;color:#fff;padding:14px 24px;border-radius:10px;font-weight:700;text-decoration:none;font-size:1rem;margin-bottom:10px;}
  .cta:hover{background:#be123c;}
  .secondary{display:block;text-align:center;color:#6b7280;text-decoration:none;font-size:.85rem;padding:8px;}
  .footer{text-align:center;margin-top:24px;font-size:.7rem;color:#9ca3af;}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:14px;border-radius:10px;text-align:center;font-size:.9rem;}
  .loading{text-align:center;color:#6b7280;padding:40px;}
  .share-row{display:flex;gap:6px;margin-top:8px;}
  .share-row button{flex:1;padding:8px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;font-size:.78rem;color:#6b7280;}
  .share-row button:hover{background:#f9fafb;}
  @media (max-width: 480px){
    .container{padding:16px 12px;}
    .card{padding:24px 18px;}
    .name{font-size:1.3rem;}
    .stats{grid-template-columns:repeat(2,1fr);gap:6px;}
    .stat .n{font-size:1.3rem;}
  }
</style>
</head>
<body>
  <div class="container">
    <div class="biz-header" id="bizHeader">SKATEPARK · TEAM RIDER</div>
    <div class="card" id="card">
      <div class="loading">Loading rider profile…</div>
    </div>
    <div class="footer">
      Powered by <strong>skateOS</strong>
    </div>
  </div>

<script src="config.js"></script>
<script>
(function(){
  // Read code from URL
  var params = new URLSearchParams(window.location.search);
  var code = (params.get('code') || '').toUpperCase().trim();
  var bizName = (window.APP_CONFIG && window.APP_CONFIG.bizName) || '2nd Nature Park';
  var bizAddr = (window.APP_CONFIG && window.APP_CONFIG.bizAddress) || '';
  var SUPABASE_URL = (window.APP_CONFIG && window.APP_CONFIG.supabaseUrl) || '';
  var SUPABASE_KEY = (window.APP_CONFIG && window.APP_CONFIG.supabaseAnonKey) || '';

  document.getElementById('bizHeader').textContent = bizName.toUpperCase() + ' · TEAM RIDER';
  document.title = 'Team rider · ' + bizName;

  if(!code){
    document.getElementById('card').innerHTML = '<div class="err">No affiliate code in URL.<br><br>Format: <code>affiliate.html?code=XXXXX</code></div>';
    return;
  }

  // Call the public affiliate_code_lookup RPC (anon-permissioned, mig 045)
  fetch(SUPABASE_URL + '/rest/v1/rpc/affiliate_code_lookup', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    },
    body: JSON.stringify({ p_code: code })
  })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    var hit = Array.isArray(rows) ? rows[0] : rows;
    if(!hit || !hit.code_id){
      document.getElementById('card').innerHTML = '<div class="err">Affiliate code "<strong>' + escapeHtml(code) + '</strong>" not found or disabled.<br><br>Double-check the code with your team rider, or visit <a href="/" style="color:#7c3aed;">our home page</a>.</div>';
      return;
    }
    renderProfile(hit);
  })
  .catch(function(err){
    document.getElementById('card').innerHTML = '<div class="err">Couldn\'t load profile: ' + escapeHtml(err.message || String(err)) + '<br><br>The shop may be in setup. Check back later.</div>';
  });

  function renderProfile(p){
    var name = p.customer_name || 'Team Rider';
    var first = name.split(' ')[0] || name;
    var photoStyle = p.photo_url ? ('background-image:url(' + escapeAttr(p.photo_url) + ');') : '';
    var photoInner = p.photo_url ? '' : escapeHtml((first.charAt(0)||'?').toUpperCase());
    var bio = p.bio ? '<div class="bio">"' + escapeHtml(p.bio) + '"</div>' : '';
    var socials = '';
    if(p.social_handles){
      var bits = [];
      if(p.social_handles.instagram) bits.push('<a href="https://instagram.com/' + encodeURIComponent(p.social_handles.instagram) + '" target="_blank" title="Instagram">📷 @' + escapeHtml(p.social_handles.instagram) + '</a>');
      if(p.social_handles.tiktok)    bits.push('<a href="https://tiktok.com/@'   + encodeURIComponent(p.social_handles.tiktok)    + '" target="_blank" title="TikTok">🎵 @'    + escapeHtml(p.social_handles.tiktok)    + '</a>');
      if(p.social_handles.youtube)   bits.push('<a href="https://youtube.com/@'  + encodeURIComponent(p.social_handles.youtube)   + '" target="_blank" title="YouTube">▶ @'    + escapeHtml(p.social_handles.youtube)   + '</a>');
      if(bits.length) socials = '<div class="socials">' + bits.join(' · ') + '</div>';
    }

    var html = ''
      + '<div class="photo" style="' + photoStyle + '">' + photoInner + '</div>'
      + '<div class="name">' + escapeHtml(name) + '</div>'
      + '<div class="role">' + escapeHtml(bizName) + ' team rider</div>'
      + bio
      + socials
      + '<div class="code-box">'
      +   '<div class="lbl">Use my code at the shop</div>'
      +   '<div class="code">' + escapeHtml(p.code) + '</div>'
      +   '<button class="copy" onclick="copyAffiliateCode(\'' + escapeAttr(p.code) + '\', this)">Copy code</button>'
      +   '<div class="share-row">'
      +     '<button onclick="shareNative(\'' + escapeAttr(p.code) + '\', \'' + escapeAttr(name) + '\')" title="Native share">📤 Share</button>'
      +     '<button onclick="shareTo(\'sms\', \'' + escapeAttr(p.code) + '\', \'' + escapeAttr(name) + '\')">💬 SMS</button>'
      +     '<button onclick="shareTo(\'email\', \'' + escapeAttr(p.code) + '\', \'' + escapeAttr(name) + '\')">✉️ Email</button>'
      +   '</div>'
      + '</div>'
      + '<div class="stats">'
      +   '<div class="stat"><div class="n">' + (p.total_referrals||0) + '</div><div class="l">Friends referred</div></div>'
      +   '<div class="stat"><div class="n">$' + Number(p.total_revenue||0).toFixed(0) + '</div><div class="l">Driven to shop</div></div>'
      + '</div>'
      + '<a class="cta" href="/">Visit ' + escapeHtml(bizName) + ' →</a>'
      + (bizAddr ? '<a class="secondary" href="https://maps.apple.com/?q=' + encodeURIComponent(bizAddr) + '" target="_blank">📍 ' + escapeHtml(bizAddr) + '</a>' : '');

    document.getElementById('card').innerHTML = html;
  }

  // Expose helpers for onclick handlers
  window.copyAffiliateCode = function(code, btn){
    if(navigator.clipboard){
      navigator.clipboard.writeText(code).then(function(){
        if(btn){ var orig = btn.textContent; btn.textContent = '✓ Copied'; setTimeout(function(){ btn.textContent = orig; }, 1800); }
      });
    } else {
      var ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch(_) {}
      document.body.removeChild(ta);
      if(btn){ var orig = btn.textContent; btn.textContent = '✓ Copied'; setTimeout(function(){ btn.textContent = orig; }, 1800); }
    }
  };
  window.shareNative = function(code, name){
    var url = window.location.href;
    var text = name + ' wants you to use their code ' + code + ' at ' + bizName + '!';
    if(navigator.share){
      navigator.share({ title: name + ' · ' + bizName, text: text, url: url }).catch(function(){});
    } else {
      window.copyAffiliateCode(url, null);
      alert('Link copied to clipboard. Paste it anywhere to share.');
    }
  };
  window.shareTo = function(channel, code, name){
    var url = window.location.href;
    var msg = name + ' wants you to use their code ' + code + ' at ' + bizName + '! ' + url;
    if(channel === 'sms') window.location.href = 'sms:?body=' + encodeURIComponent(msg);
    if(channel === 'email') window.location.href = 'mailto:?subject=' + encodeURIComponent(name + ' @ ' + bizName) + '&body=' + encodeURIComponent(msg);
  };

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, function(ch){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];
    });
  }
  function escapeAttr(s){ return String(s||'').replace(/['"\\]/g, '\\$&'); }
})();
</script>
</body>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1f1f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="50%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fb7185" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top label -->
  <text x="80" y="100" fill="#737373" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="22" font-weight="700" letter-spacing="2">SKATEOS · OPERATING SYSTEM</text>
  <text x="80" y="125" fill="#737373" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="22" font-weight="700" letter-spacing="2">FOR SKATESHOPS &amp; SKATEPARKS</text>

  <!-- Headline -->
  <text x="80" y="285" fill="#faf8f3" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="84" font-weight="900" letter-spacing="-2">Built by skaters,</text>
  <text x="80" y="385" fill="url(#accent)" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="84" font-weight="900" letter-spacing="-2">for skaters.</text>

  <!-- Subheadline -->
  <text x="80" y="455" fill="#a3a3a3" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="28" font-weight="500">Check-ins · POS · lessons · memberships · mobile shop · reports</text>

  <!-- Bottom: feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="22" font-weight="700">
    <rect x="80" y="510" width="180" height="48" rx="24" fill="#262626" stroke="#404040" stroke-width="1"/>
    <text x="170" y="542" fill="#fb7185" text-anchor="middle">⚡ Day 1 live</text>

    <rect x="280" y="510" width="240" height="48" rx="24" fill="#262626" stroke="#404040" stroke-width="1"/>
    <text x="400" y="542" fill="#fb7185" text-anchor="middle">🛹 White-label SaaS</text>

    <rect x="540" y="510" width="220" height="48" rx="24" fill="#262626" stroke="#404040" stroke-width="1"/>
    <text x="650" y="542" fill="#fb7185" text-anchor="middle">📱 Web + iPad</text>
  </g>

  <!-- URL -->
  <text x="1120" y="585" fill="#737373" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', monospace" font-size="20" font-weight="600" text-anchor="end">skateos.com</text>

  <!-- Accent shape: lightning bolt in corner -->
  <g transform="translate(960,160)" opacity="0.92">
    <path d="M 50 0 L 0 90 L 35 90 L 20 165 L 70 70 L 35 70 Z" fill="url(#accent)" />
  </g>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your order | 2nd Nature</title>
<meta name="description" content="Track your 2nd Nature skate shop order — payment, fulfillment, shipping updates.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#faf8f3">
<link rel="icon" href="https://2ntr.com/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Knewave&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    color:#14161a;background:#faf8f3;line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  .hand{font-family:'Knewave','Permanent Marker',cursive;font-weight:400;}
  .header{padding:24px 28px 6px;text-align:center;}
  .logo{display:inline-block;font-size:clamp(2.2rem,5vw,3.4rem);color:#14161a;line-height:.9;}
  .logo .nd{font-size:.42em;vertical-align:.55em;margin:0 .04em 0 .08em;}
  .nav-back{margin-top:16px;font-size:.86rem;font-weight:600;display:inline-block;border-bottom:2px solid transparent;padding:4px 0;}
  .nav-back:hover{border-color:#14161a;}
  .wrap{max-width:720px;margin:0 auto;padding:24px 28px 60px;}
  .card{background:#fff;border:1px solid #e6e3da;border-radius:10px;padding:24px;margin-bottom:18px;}
  h1.hand{font-size:clamp(1.8rem,4vw,2.4rem);color:#14161a;line-height:1;margin-bottom:14px;}
  .pay-cta{
    display:inline-block;background:#e11d48;color:white;
    padding:14px 28px;border-radius:8px;font-size:1.05rem;font-weight:800;
    text-decoration:none;margin-top:8px;
  }
  .pay-cta:hover{background:#be123c;}
  .timeline{list-style:none;padding:0;margin:0;}
  .timeline li{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #f3f4f6;}
  .timeline li:last-child{border-bottom:none;}
  .timeline .icon{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1rem;color:white;flex-shrink:0;
  }
  .timeline .icon.done{background:#15803d;}
  .timeline .icon.now{background:#e11d48;animation:pulse 2s infinite;}
  .timeline .icon.todo{background:#d1d5db;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
  .timeline .body{flex:1;}
  .timeline .body h4{font-size:1rem;font-weight:700;color:#14161a;line-height:1.3;}
  .timeline .body p{font-size:.86rem;color:#4b5563;margin-top:2px;}
  .timeline .body .ts{font-size:.74rem;color:#9ca3af;margin-top:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:.88rem;}
  th{text-align:left;padding:8px 10px;border-bottom:2px solid #e6e3da;font-size:.74rem;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  td{padding:10px;border-bottom:1px solid #f3f4f6;}
  tr:last-child td{border-bottom:none;}
  .totals{background:#fff;border:2px solid #14161a;border-radius:10px;padding:18px 22px;margin-top:18px;}
  .totals .row{display:flex;justify-content:space-between;align-items:baseline;font-size:.92rem;color:#4b5563;margin-bottom:8px;}
  .totals .row.total{
    border-top:2px dashed #e6e3da;padding-top:10px;margin-top:10px;
    font-size:1.15rem;font-weight:800;color:#14161a;
  }
  .totals .row.total.paid{color:#15803d;}
  .empty{text-align:center;padding:50px 20px;color:#6b7280;font-size:.95rem;}
  .empty .big{font-size:3rem;margin-bottom:14px;}
  .help{background:#f0f9ff;border-left:4px solid #0891b2;padding:14px 18px;border-radius:8px;font-size:.86rem;color:#0e7490;margin-top:18px;}
  .help a{color:#0891b2;text-decoration:underline;font-weight:600;}
  footer{text-align:center;padding:30px 28px;font-size:.74rem;color:#9ca3af;}
  .alert{padding:14px 16px;border-radius:8px;margin-top:14px;font-size:.92rem;}
  .alert.warn{background:#fef3c7;border-left:4px solid #d97706;color:#92400e;}
  .alert.danger{background:#fee2e2;border-left:4px solid #dc2626;color:#991b1b;}
</style>
</head>
<body>
  <header class="header">
    <a href="https://shop.skateos.com" class="logo hand" aria-label="2nd Nature shop">2<span class="nd">ND</span>nature</a>
    <div><a href="https://shop.skateos.com" class="nav-back">← Back to shop</a></div>
  </header>

  <main class="wrap">
    <div id="content">
      <div class="card empty">
        <div class="big">⏳</div>
        <div>Loading your order…</div>
      </div>
    </div>
  </main>

  <footer>
    © 2026 2nd Nature Skate · 1 Highland Industrial Park, Peekskill, NY 10566 · <a href="mailto:info@2ntr.com">info@2ntr.com</a> · <a href="tel:+19144024624">(914) 402-4624</a>
  </footer>

<script>
  var SUPABASE_URL = 'https://zecurmlenxyxanqucrga.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplY3VybWxlbnh5eGFucXVjcmdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTUzMjIsImV4cCI6MjA5MzAzMTMyMn0.PtW3hxsok3ZUw0CFdB7aysnJ2UFkwltHq2Bt1Pw-hK8';

  function escHtml(s){
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function money(n){ return '$' + (Number(n)||0).toFixed(2); }
  function fmtDate(iso){
    if(!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'}) + ' · ' + d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    } catch(e){ return iso; }
  }
  function isUuid(s){
    return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s||'');
  }

  function renderEmpty(message){
    document.getElementById('content').innerHTML =
      '<div class="card empty">'
      + '<div class="big">📭</div>'
      + '<div style="font-size:1.05rem;font-weight:700;color:#14161a;margin-bottom:6px;">'+escHtml(message||"We couldn\'t find that order")+'</div>'
      + '<div style="margin-top:8px;">Double-check the link from your confirmation email, or <a href="mailto:info@2ntr.com" style="color:#e11d48;text-decoration:underline;">email info@2ntr.com</a> with your name.</div>'
      + '</div>';
  }

  function renderStatus(d){
    var subDate = fmtDate(d.submitted_at);
    var paid = d.payment_status === 'paid';
    var fulfilled = !!d.fulfilled_at;
    var isShip = d.fulfillment === 'ship';
    var totals = d.totals || {};
    var items = d.items || [];

    var html = '';

    // Header
    var headerName = d.first_name ? "Hey, " + escHtml(d.first_name) + " 🛹" : "Your order";
    html += '<div class="card">';
    html += '<h1 class="hand">'+headerName+'</h1>';
    html += '<p style="color:#4b5563;font-size:.96rem;">Submitted <strong style="color:#14161a;">'+subDate+'</strong> · '+items.length+' item'+(items.length===1?'':'s')+' · '+money(totals.subtotal||0)+'</p>';

    // Pay-now CTA when payment pending + Helcim URL is present
    if(!paid && d.helcim_payment_url){
      html += '<div style="margin-top:14px;">';
      html += '<a href="'+escHtml(d.helcim_payment_url)+'" class="pay-cta">💳 Pay '+money(totals.subtotal||0)+' now →</a>';
      html += '<div style="margin-top:10px;font-size:.82rem;color:#6b7280;">Card processed securely by Helcim. We never see your card details.</div>';
      html += '</div>';
    } else if(!paid){
      html += '<div class="alert warn"><strong>Awaiting payment link.</strong> We\'ll text or email you a payment link within a few hours.</div>';
    }

    // Oversold warning (rare but possible — race condition handled by mig 054)
    if(d.oversold_count > 0){
      html += '<div class="alert danger"><strong>⚠ Stock issue.</strong> '+d.oversold_count+' item'+(d.oversold_count===1?'':'s')+' on this order may have been short — we\'re reaching out to let you know what happened. Reply to your confirmation email or call us if you need it sooner.</div>';
    }

    html += '</div>';

    // Status timeline — 4 stages
    html += '<div class="card">';
    html += '<h2 style="font-size:1.1rem;margin-bottom:14px;color:#14161a;">Status</h2>';
    html += '<ul class="timeline">';

    html += stage('done', '✓', 'Order received', 'We got your order. ' + (paid ? '' : 'Pay using the card link below or above.'), subDate);

    if(paid){
      html += stage('done', '✓', 'Payment received', 'Thanks! We\'re ' + (isShip ? 'pulling your gear + getting it ready to ship' : 'pulling your gear for pickup') + '.', fmtDate(d.payment_paid_at));
    } else {
      html += stage('now', '💳', 'Payment pending', 'Pay using the link above to lock in your order.', '');
    }

    if(fulfilled){
      var fLabel = isShip ? 'Shipped' : 'Picked up · order complete';
      var fSub;
      if(isShip){
        fSub = d.tracking_number
          ? 'Tracking: ' + (d.carrier ? d.carrier + ' · ' : '') + d.tracking_number
          : 'Your package is on its way.';
      } else {
        fSub = 'Thanks for shopping with us!';
      }
      html += stage('done', isShip ? '📦' : '🛹', fLabel, fSub, fmtDate(d.fulfilled_at));
    } else if(paid){
      var rLabel = isShip ? 'Ready to ship' : 'Ready for pickup';
      var rSub = isShip
        ? 'We\'re prepping it now. You\'ll get a notification when it ships.'
        : 'Come grab it at the shop — 1 Highland Industrial Park, Peekskill NY 10566. Open during park hours.';
      html += stage('now', isShip ? '📦' : '🛹', rLabel, rSub, '');
    } else {
      var tLabel = isShip ? 'Will ship after payment' : 'Pickup after payment';
      var tSub = isShip ? 'Once your card lands, we\'ll prep + ship.' : 'Once your card lands, your order will be ready for pickup at the shop.';
      html += stage('todo', isShip ? '📦' : '🛹', tLabel, tSub, '');
    }

    html += '</ul></div>';

    // Tracking card — ship-orders only, when tracking_number is captured
    if(isShip && fulfilled && d.tracking_number){
      var trackUrl = '';
      var carrLow = (d.carrier||'').toLowerCase();
      if(carrLow.indexOf('ups') >= 0) trackUrl = 'https://www.ups.com/track?tracknum=' + encodeURIComponent(d.tracking_number);
      else if(carrLow.indexOf('usps') >= 0) trackUrl = 'https://tools.usps.com/go/TrackConfirmAction?qtc_tLabels1=' + encodeURIComponent(d.tracking_number);
      else if(carrLow.indexOf('fedex') >= 0) trackUrl = 'https://www.fedex.com/fedextrack/?trknbr=' + encodeURIComponent(d.tracking_number);
      else if(carrLow.indexOf('dhl') >= 0) trackUrl = 'https://www.dhl.com/us-en/home/tracking.html?tracking-id=' + encodeURIComponent(d.tracking_number);
      html += '<div class="card" style="background:#f0fdf4;border-color:#bbf7d0;">';
      html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">';
      html += '<div style="font-size:1.6rem;">📦</div>';
      html += '<div>';
      html += '<div style="font-size:.74rem;color:#15803d;text-transform:uppercase;letter-spacing:.04em;font-weight:700;">Tracking</div>';
      html += '<div style="font-size:1.1rem;font-weight:700;color:#14161a;">'+escHtml(d.carrier||'Carrier')+'</div>';
      html += '</div></div>';
      html += '<div style="font-family:ui-monospace,monospace;font-size:1rem;background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #bbf7d0;color:#14161a;letter-spacing:.02em;word-break:break-all;">'+escHtml(d.tracking_number)+'</div>';
      if(trackUrl){
        html += '<div style="margin-top:12px;"><a href="'+escHtml(trackUrl)+'" target="_blank" rel="noopener" style="display:inline-block;padding:10px 18px;background:#15803d;color:#fff;border-radius:6px;font-weight:700;font-size:.9rem;text-decoration:none;">→ Track on '+escHtml(d.carrier||'carrier')+'\'s site</a></div>';
      } else {
        html += '<div style="margin-top:10px;font-size:.84rem;color:#15803d;">Look up your tracking number on your carrier\'s website.</div>';
      }
      html += '</div>';
    }

    // Items + totals
    html += '<div class="card">';
    html += '<h2 style="font-size:1.1rem;margin-bottom:14px;color:#14161a;">Order details</h2>';
    html += '<table>';
    html += '<thead><tr><th>Item</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Each</th><th style="text-align:right;">Line</th></tr></thead>';
    html += '<tbody>';
    items.forEach(function(it){
      var nameCell = '<strong>'+escHtml(it.brand||'')+'</strong> '+escHtml(it.name||'');
      html += '<tr>';
      html += '<td>'+nameCell+'</td>';
      html += '<td style="text-align:center;">'+(it.qty||1)+'</td>';
      html += '<td style="text-align:right;">'+money(it.unit_price||0)+'</td>';
      html += '<td style="text-align:right;font-weight:700;">'+money(it.line_total||0)+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';

    html += '<div class="totals">';
    html += '<div class="row"><span>Subtotal</span><span>'+money(totals.subtotal||0)+'</span></div>';
    if(isShip) html += '<div class="row"><span>Shipping</span><span style="color:#9ca3af;font-size:.82rem;">added to total when invoice generates</span></div>';
    html += '<div class="row total '+(paid?'paid':'')+'"><span>Total '+(paid?'· PAID':'')+'</span><span>'+money(totals.subtotal||0)+'</span></div>';
    html += '</div>';

    // Fulfillment block
    html += '<div style="margin-top:14px;padding:14px 16px;background:#faf8f3;border-radius:8px;font-size:.88rem;">';
    html += '<div style="font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:6px;">Fulfillment</div>';
    if(isShip){
      html += '<div><strong>📦 Ship</strong></div>';
      if(d.shipping_address){
        html += '<div style="margin-top:6px;font-family:ui-monospace,monospace;font-size:.84rem;color:#374151;">'+escHtml(d.shipping_address).replace(/\n/g,'<br>')+'</div>';
      }
    } else {
      html += '<div><strong>🛹 Pickup at the shop</strong></div>';
      html += '<div style="margin-top:4px;color:#6b7280;">1 Highland Industrial Park, Peekskill NY 10566</div>';
    }
    html += '</div>';
    html += '</div>';

    html += '<div class="help"><strong>Questions or changes?</strong> Reply to your confirmation email, message us at <a href="mailto:info@2ntr.com">info@2ntr.com</a>, or call <a href="tel:+19144024624">(914) 402-4624</a>.</div>';

    document.getElementById('content').innerHTML = html;
  }

  function stage(state, icon, title, subtitle, ts){
    var html = '<li>';
    html += '<div class="icon '+state+'">'+icon+'</div>';
    html += '<div class="body">';
    html += '<h4>'+escHtml(title)+'</h4>';
    if(subtitle) html += '<p>'+escHtml(subtitle)+'</p>';
    if(ts) html += '<div class="ts">'+escHtml(ts)+'</div>';
    html += '</div>';
    html += '</li>';
    return html;
  }

  (async function(){
    var url = new URL(location.href);
    var id = url.searchParams.get('id');
    if(!id || !isUuid(id)){
      renderEmpty(id ? 'That link doesn\'t look like a valid order ID.' : 'No order ID in this link.');
      return;
    }
    try {
      var res = await fetch(SUPABASE_URL+'/rest/v1/rpc/retail_order_status_lookup', {
        method:'POST',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer '+SUPABASE_ANON_KEY, 'Content-Type':'application/json' },
        body: JSON.stringify({ p_id: id })
      });
      if(!res.ok){
        var msg = (await res.text().catch(function(){return '';})) || ('HTTP '+res.status);
        if(/Could not find|does not exist/i.test(msg)){
          renderEmpty("Order tracking isn't set up yet. Email info@2ntr.com.");
          return;
        }
        throw new Error(msg);
      }
      var data = await res.json();
      if(!data || data.found === false){
        renderEmpty("We couldn't find that order. The link may be invalid or the order may have been cancelled.");
        return;
      }
      renderStatus(data);
    } catch(e){
      console.error('Status lookup failed:', e);
      renderEmpty('Something went wrong loading your order. Please try again or email info@2ntr.com.');
    }
  })();
</script>
</body>
</html>
